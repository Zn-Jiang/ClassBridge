internal_token = "replace-with-a-random-token"
server_ws_url = "ws://127.0.0.1:8765/ws/client"
log_level = "INFO"

[client]
client_name = "classroom-desktop"
ntp_server = "ntp.aliyun.com"
auto_popup_on_break = true
close_to_tray = true
enable_urgent_sound = true
history_retention_days = 180
urgent_remind_default_minutes = 10
reconnect_initial_delay_seconds = 1
reconnect_max_delay_seconds = 60

[schedule]
timezone = "Asia/Shanghai"

[challenge]
challenge_url = "http://127.0.0.1:6666/challenge"
verify_url = "http://127.0.0.1:6666/verify"
fallback_question = "密码"
fallback_answer = "replace-with-a-strong-password"
